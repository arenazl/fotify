name: Build Fotify iOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate App Icon
        run: |
          python3 -c "
          from PIL import Image, ImageDraw
          import math

          size = 1024
          img = Image.new('RGBA', (size, size), (0, 0, 0, 255))
          draw = ImageDraw.Draw(img)

          # Purple gradient circle
          cx, cy = size // 2, size // 2
          for r in range(380, 0, -1):
              ratio = r / 380.0
              red = int(90 + (140 - 90) * ratio)
              green = int(20 + (60 - 20) * (1 - ratio))
              blue = int(220 + (255 - 220) * (1 - ratio))
              draw.ellipse([cx-r, cy-r, cx+r, cy+r], fill=(red, green, blue, 255))

          # White aperture blades
          for i in range(6):
              angle = math.radians(i * 60 - 15)
              x1 = cx + int(120 * math.cos(angle))
              y1 = cy + int(120 * math.sin(angle))
              x2 = cx + int(280 * math.cos(angle + math.radians(30)))
              y2 = cy + int(280 * math.sin(angle + math.radians(30)))
              x3 = cx + int(280 * math.cos(angle + math.radians(50)))
              y3 = cy + int(280 * math.sin(angle + math.radians(50)))
              draw.polygon([(x1, y1), (x2, y2), (x3, y3)], fill=(255, 255, 255, 60))

          # Center dot
          draw.ellipse([cx-40, cy-40, cx+40, cy+40], fill=(255, 255, 255, 200))

          img.save('Fotify/Assets.xcassets/AppIcon.appiconset/icon.png')
          img.resize((128, 128), Image.LANCZOS).save('icon_small.png')
          " 2>/dev/null || echo 'Pillow not available, skipping icon generation'

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Build and create IPA
        run: |
          xcodebuild archive \
            -project Fotify.xcodeproj \
            -scheme Fotify \
            -destination 'generic/platform=iOS' \
            -archivePath build/Fotify.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          APP_PATH="build/Fotify.xcarchive/Products/Applications/Fotify.app"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r Fotify.ipa Payload/

      - name: Deploy IPA to fotify-dist
        run: |
          git clone https://x-access-token:${{ secrets.DIST_PAT }}@github.com/arenazl/fotify-dist.git dist-repo
          cp build/Fotify.ipa dist-repo/Fotify.ipa
          cd dist-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Fotify.ipa
          git commit -m "Update Fotify.ipa - $(date +%Y-%m-%d-%H%M)" || echo "No changes"
          git push

      - name: Create GitHub Release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          gh release create latest \
            build/Fotify.ipa \
            --title "Fotify Latest" \
            --notes "Build automático $(date +%Y-%m-%d)" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
