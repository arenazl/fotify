name: Build Fotify iOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Build and create IPA
        run: |
          # Build for device with ad-hoc signing
          xcodebuild archive \
            -project Fotify.xcodeproj \
            -scheme Fotify \
            -destination 'generic/platform=iOS' \
            -archivePath build/Fotify.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          # Create ExportOptions plist for ad-hoc
          cat > build/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST

          # Manually create IPA from archive
          APP_PATH="build/Fotify.xcarchive/Products/Applications/Fotify.app"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r Fotify.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Fotify-unsigned
          path: build/Fotify.ipa
