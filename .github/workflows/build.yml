name: Build Fotify iOS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: App Icon
        run: echo "Using committed icon.png"

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: Build and create IPA
        run: |
          xcodebuild archive \
            -project Fotify.xcodeproj \
            -scheme Fotify \
            -destination 'generic/platform=iOS' \
            -archivePath build/Fotify.xcarchive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

          APP_PATH="build/Fotify.xcarchive/Products/Applications/Fotify.app"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r Fotify.ipa Payload/

      - name: Deploy IPA to fotify-dist
        run: |
          git clone https://x-access-token:${{ secrets.DIST_PAT }}@github.com/arenazl/fotify-dist.git dist-repo
          cp build/Fotify.ipa dist-repo/Fotify.ipa
          cd dist-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Fotify.ipa
          git commit -m "Update Fotify.ipa - $(date +%Y-%m-%d-%H%M)" || echo "No changes"
          git push

      - name: Create GitHub Release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          gh release create latest \
            build/Fotify.ipa \
            --title "Fotify Latest" \
            --notes "Build automático $(date +%Y-%m-%d)" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
