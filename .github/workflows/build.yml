name: Build Fotify iOS

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: List available Xcode versions
        run: ls /Applications/ | grep Xcode

      - name: Select latest Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - name: List available simulators
        run: xcrun simctl list devices available | head -30

      - name: Build
        run: |
          xcodebuild build \
            -project Fotify.xcodeproj \
            -scheme Fotify \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Archive for device
        if: github.event_name == 'workflow_dispatch'
        run: |
          xcodebuild archive \
            -project Fotify.xcodeproj \
            -scheme Fotify \
            -destination 'generic/platform=iOS' \
            -archivePath build/Fotify.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload archive
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Fotify-archive
          path: build/Fotify.xcarchive
